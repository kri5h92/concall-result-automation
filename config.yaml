# ============================================================
# Concall Result Automation — Configuration
# ============================================================
# All settings here are defaults. CLI args override these values.

# Tickers to process. Leave empty to use all tickers from tickers.csv.
tickers:
  # - ANANDRATHI
  # - CEINSYS
  # - SALZERELEC

# LLM models used for analysis. Every pending transcript is analyzed by every
# model listed here. Use "provider/model" format for OpenRouter, or a plain
# Gemini model name for the direct Gemini client.
models:
  # - google/gemini-2.5-flash
  - anthropic/claude-4.7-opus

# Treat compatible model versions as the same result set on disk. The key is
# the model to call; the value is the model name used for output filenames and
# idempotency checks. This example calls Opus 4.7 but reuses/skips existing
# Opus 4.6 analysis files.
model_output_aliases:
  anthropic/claude-4.7-opus: anthropic/claude-4.6-opus

# Pipeline phase to run: download | extract | analyze | all
phase: all

# If true, process all historical quarters.
all_quarters: false

# If all_quarters is false, process only the most recent N concalls per ticker.
# This limit is applied consistently by download, extraction, and analysis.
recent_quarters: 2

# Watch mode: continuously poll for new transcripts instead of a single run.
watch: false

# Seconds between polls in watch mode.
poll_interval: 30

# Seconds to wait between consecutive LLM API calls (rate-limit safety).
api_delay: 2.0
