# ============================================================
# Sector / Sub-Sector KPI Definitions
# ============================================================
#
# HOW TO FILL THIS FILE
# ---------------------
# For each sub-sector, write two plain-text blocks:
#
#   kpis: |
#     Write one KPI per line starting with a dash.
#     Each line should say: what the metric is, what unit it's in,
#     and what specifically to look for in the transcript.
#     Be as plain and specific as you would be when briefing a junior analyst.
#
#   notes: |
#     Write any nuances, traps, or context that the model should know
#     about this sub-sector. What do experienced analysts focus on here
#     that a generic model might miss? What language does management use
#     that sounds positive but is actually a warning sign?
#
# Both fields are injected verbatim into the Opus prompt for that company.
# There is no special syntax — just plain sentences.
#
# FALLBACK ORDER
# --------------
# sub-sector kpis → sector _defaults kpis → _defaults kpis
# If a sub-sector has no kpis defined, the sector default is used.
# If neither is defined, no KPI block is added to the prompt.
#
# ============================================================

